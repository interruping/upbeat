openapi: "3.1.0"
info:
  title: Upbit Exchange API
  description: |
    업비트 거래 및 자산 관리(Exchange) API 명세.
    인증이 필요한 API입니다 (JWT Bearer).

    ## 공통 사항
    - TLS 1.2 이상 필요 (1.3 권장)
    - Content-Type: application/json; charset=utf-8
    - POST 요청은 반드시 JSON 형식으로 본문(Body)을 전송해야 합니다 (Form 방식 지원 종료, 2022-03)
    - 모든 Rate Limit은 계정 단위로 측정됩니다
    - 응답 헤더 Remaining-Req로 잔여 요청 횟수를 확인할 수 있습니다
      (형식: "group=default; min=1800; sec=29")
    - 모든 금액/수량 값은 정밀도를 위해 문자열(string)로 반환됩니다
  version: "1.6.1"
  contact:
    name: Upbit Open API
    url: https://docs.upbit.com

servers:
  - url: https://api.upbit.com
    description: Upbit Production

security:
  - jwt: []

tags:
  - name: accounts
    description: 계정 잔고 조회
  - name: orders
    description: 주문 생성/조회/취소
  - name: deposits
    description: 입금 조회/요청
  - name: withdrawals
    description: 출금 조회/요청
  - name: travel_rule
    description: 트래블룰 검증
  - name: service
    description: 서비스 상태 및 API Key 관리

# ─────────────────────────── paths ───────────────────────────

paths:

  # ── Accounts ──

  /v1/accounts:
    get:
      operationId: listAccounts
      summary: 계정 잔고 조회
      description: 계정이 보유하고 있는 자산 목록과 잔고를 조회합니다.
      tags: [accounts]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      responses:
        "200":
          description: 자산 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Orders ──

  /v1/orders:
    post:
      operationId: createOrder
      summary: 주문 생성
      description: |
        특정 페어를 매수/매도하기 위한 주문을 생성합니다.

        주문 유형(ord_type):
        - `limit`: 지정가 주문
        - `price`: 시장가 매수 주문
        - `market`: 시장가 매도 주문
        - `best`: 최유리 지정가 주문

        주문 체결 조건(time_in_force):
        - `ioc`: IOC (Immediate or Cancel)
        - `fok`: FOK (Fill or Kill)
        - `post_only`: Post Only (지정가 주문에서만 사용 가능)
      tags: [orders]
      x-rate-limit:
        group: order
        max_per_sec: 8
        unit: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: 생성된 주문 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/orders/test:
    post:
      operationId: createOrderTest
      summary: 주문 생성 테스트
      description: |
        실제 주문을 생성하지 않고 주문 요청 형식과 주문 가능 여부를 검증합니다.

        실제 주문 API를 호출하기 전 이 API를 통해 거래 수수료 없이 주문 생성 가능 여부를 테스트하고,
        발생 가능한 오류를 사전에 확인할 수 있습니다.

        테스트 주문은 실제 주문과 동일한 검증 과정을 거치지만, 주문이 실제로 생성되지는 않습니다.
        따라서 응답으로 반환된 UUID(혹은 identifier)는 주문 조회나 취소 요청에 사용할 수 없습니다.
      tags: [orders]
      x-rate-limit:
        group: order_test
        max_per_sec: 8
        unit: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: 테스트 주문 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/order:
    get:
      operationId: getOrder
      summary: 개별 주문 조회
      description: |
        주문의 UUID 또는 Identifier로 단일 주문 정보를 조회합니다.

        uuid 또는 identifier 중 하나는 반드시 포함해야 합니다.
        uuid와 identifier를 모두 사용하는 경우, uuid를 기준으로 조회됩니다.
      tags: [orders]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      parameters:
        - name: uuid
          in: query
          required: false
          description: 조회하고자 하는 주문의 유일식별자(UUID)
          schema:
            type: string
        - name: identifier
          in: query
          required: false
          description: 조회하고자 하는 주문의 클라이언트 지정 식별자
          schema:
            type: string
      responses:
        "200":
          description: 주문 상세 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: cancelOrder
      summary: 개별 주문 취소 접수
      description: |
        UUID 또는 Identifier로 주문을 취소합니다.

        uuid 또는 identifier 중 하나는 반드시 포함해야 합니다.
        uuid와 identifier를 모두 사용하는 경우, uuid를 기준으로 취소됩니다.
      tags: [orders]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      parameters:
        - name: uuid
          in: query
          required: false
          description: 취소하고자 하는 주문의 유일식별자(UUID)
          schema:
            type: string
        - name: identifier
          in: query
          required: false
          description: 취소하고자 하는 주문의 클라이언트 지정 식별자
          schema:
            type: string
      responses:
        "200":
          description: 취소 접수된 주문 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderCanceled"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/orders/open:
    get:
      operationId: listOpenOrders
      summary: 체결 대기 주문 목록 조회
      description: |
        체결 대기 중인 주문(Open Orders) 목록을 조회합니다.

        state와 states[]는 동시에 사용할 수 없습니다.
      tags: [orders]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      parameters:
        - name: market
          in: query
          required: false
          description: 조회하고자 하는 페어(거래쌍)
          schema:
            type: string
          example: "KRW-BTC"
        - name: state
          in: query
          required: false
          description: "주문의 상태. `wait`(체결 대기), `watch`(예약 주문 대기)"
          schema:
            type: string
            enum: [wait, watch]
            default: wait
        - name: states[]
          in: query
          required: false
          description: "주문의 상태 (배열). `wait`, `watch`"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [wait, watch]
        - name: page
          in: query
          required: false
          description: 조회할 페이지 번호
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          description: "요청 개수 (default: 100, max: 100)"
          schema:
            type: integer
            default: 100
            maximum: 100
        - $ref: "#/components/parameters/OrderByParam"
      responses:
        "200":
          description: 체결 대기 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderOpen"
        "400":
          $ref: "#/components/responses/BadRequest"
    delete:
      operationId: batchCancelOrders
      summary: 주문 일괄 취소 접수
      description: |
        조건을 지정하여 해당 조건을 만족하는 최대 300개의 주문을 일괄 취소합니다.

        일괄 취소 API로는 오직 체결 대기(WAIT) 상태의 주문만 취소할 수 있습니다.
        예약 주문(WATCH) 상태의 주문은 개별 주문 취소 접수 또는 id로 주문 목록 취소 접수 API를 사용해주세요.

        이 API는 쿼리 파라미터 형식만 지원합니다.
        페어(pairs)과 마켓(quote_currencies) 조건은 동시에 사용할 수 없습니다.
      tags: [orders]
      x-rate-limit:
        group: batch_cancel
        max_per_sec: 0.5
        unit: account
      parameters:
        - name: quote_currencies
          in: query
          required: false
          description: "주문 취소 대상 마켓 목록. KRW, BTC, USDT 등"
          schema:
            type: string
          example: "KRW"
        - name: cancel_side
          in: query
          required: false
          description: "취소하고자 하는 주문의 매수/매도 방향. `all`(전체), `ask`(매도), `bid`(매수)"
          schema:
            type: string
            enum: [all, ask, bid]
            default: all
        - name: count
          in: query
          required: false
          description: "취소할 주문의 최대 개수. 최대값 300, 기본값 20"
          schema:
            type: integer
            default: 20
            maximum: 300
        - name: order_by
          in: query
          required: false
          description: "취소할 주문의 정렬 방식. `asc`(오름차순), `desc`(내림차순, 기본값)"
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: pairs
          in: query
          required: false
          description: "페어(거래쌍) 목록. 최대 20개, 쉼표 구분"
          schema:
            type: string
          example: "KRW-BTC,KRW-ETH"
        - name: exclude_pairs
          in: query
          required: false
          description: "취소 제외 페어 목록. 최대 20개, 쉼표 구분"
          schema:
            type: string
          example: "KRW-BTC,KRW-ETH"
      responses:
        "200":
          description: 일괄 취소 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/orders/closed:
    get:
      operationId: listClosedOrders
      summary: 종료 주문 목록 조회
      description: |
        종료 주문(Closed Order) 목록을 조회합니다.
        종료 주문은 전량 체결 주문과 취소 주문을 포함합니다.
        조회 기간을 정하는 경우 최대 7일 구간(window)을 조회할 수 있습니다.

        state와 states[]는 동시에 사용할 수 없습니다.
      tags: [orders]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      parameters:
        - name: market
          in: query
          required: false
          description: 조회하고자 하는 페어(거래쌍)
          schema:
            type: string
          example: "KRW-BTC"
        - name: state
          in: query
          required: false
          description: "주문의 상태. `done,cancel`(전체), `done`(체결 완료만), `cancel`(취소만)"
          schema:
            type: string
            default: "done,cancel"
        - name: states[]
          in: query
          required: false
          description: "주문의 상태 (배열). `done`, `cancel`"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [done, cancel]
        - name: start_time
          in: query
          required: false
          description: "조회 기간의 시작 시각. ISO 8601 형식 또는 밀리초 타임스탬프. 최대 7일 구간"
          schema:
            type: string
        - name: end_time
          in: query
          required: false
          description: "조회 기간의 종료 시각. ISO 8601 형식 또는 밀리초 타임스탬프. 최대 7일 구간"
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: "요청 개수 (default: 100, max: 1,000)"
          schema:
            type: integer
            default: 100
            maximum: 1000
        - $ref: "#/components/parameters/OrderByParam"
      responses:
        "200":
          description: 종료 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderClosed"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/orders/uuids:
    get:
      operationId: listOrdersByIds
      summary: id로 주문 목록 조회
      description: |
        UUID 또는 Identifier 목록으로 주문을 조회합니다.

        uuid[] 또는 identifier[]를 반드시 포함해야 합니다.
        두 파라미터를 동시에 사용할 수 없습니다.
      tags: [orders]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      parameters:
        - name: market
          in: query
          required: false
          description: 조회하고자 하는 페어(거래쌍)
          schema:
            type: string
          example: "KRW-BTC"
        - name: uuids[]
          in: query
          required: false
          description: "조회하고자 하는 주문의 UUID 목록. 최대 100개"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: identifiers[]
          in: query
          required: false
          description: "조회하고자 하는 주문의 클라이언트 지정 식별자 목록. 최대 100개"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - $ref: "#/components/parameters/OrderByParam"
      responses:
        "200":
          description: 주문 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderByIds"
        "400":
          $ref: "#/components/responses/BadRequest"
    delete:
      operationId: cancelOrdersByIds
      summary: id로 주문 목록 취소 접수
      description: |
        UUID 또는 Identifier 목록으로 취소 대상 주문을 지정 취소합니다.
        한 번의 요청으로 최대 20개의 주문을 취소할 수 있습니다.

        이 API는 쿼리 파라미터 형식만 지원합니다.
        uuid[] 또는 identifier[]를 반드시 포함해야 합니다.
        두 파라미터를 동시에 사용할 수 없습니다.
      tags: [orders]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      parameters:
        - name: uuids[]
          in: query
          required: false
          description: "취소하고자 하는 주문의 UUID 목록. 최대 20개"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: identifiers[]
          in: query
          required: false
          description: "취소하고자 하는 주문의 클라이언트 지정 식별자 목록. 최대 20개"
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: 취소 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/orders/cancel_and_new:
    post:
      operationId: cancelAndNewOrder
      summary: 취소 후 재주문
      description: |
        한 번의 요청으로 기존 주문을 취소하고 신규 주문을 생성합니다.

        신규 주문은 기존 주문과 동일한 페어, 동일한 주문 방향에 대해서만 생성 가능합니다.
        기존 주문의 취소가 완료된 이후 신규 주문이 생성됩니다.

        prev_order_uuid 또는 prev_order_identifier를 반드시 포함해야 합니다.
      tags: [orders]
      x-rate-limit:
        group: order
        max_per_sec: 8
        unit: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelAndNewOrderRequest"
      responses:
        "201":
          description: 취소 및 재주문 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelAndNewOrderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/orders/chance:
    get:
      operationId: getOrderChance
      summary: 페어별 주문 가능 정보 조회
      description: |
        지정한 페어의 주문 가능 정보를 조회합니다.

        적용 수수료율, 지원 주문 방향 및 유형, 기준/호가 자산의 통화 및
        최소/최대 주문 가능 금액, 계정 잔고 등을 확인할 수 있습니다.
      tags: [orders]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      parameters:
        - name: market
          in: query
          required: true
          description: 조회하고자 하는 페어(거래쌍)
          schema:
            type: string
          example: "KRW-BTC"
      responses:
        "200":
          description: 주문 가능 정보
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderChance"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Deposits ──

  /v1/deposit:
    get:
      operationId: getDeposit
      summary: 개별 입금 조회
      description: |
        최신 입금 이력을 조회합니다.
        특정 입금 정보를 조회하고자 하는 경우 입금의 UUID 또는 트랜잭션 ID(TXID), 통화 코드로 지정할 수 있습니다.
      tags: [deposits]
