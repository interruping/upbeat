          description: "디지털 자산 입출금에 사용되는 블록체인 네트워크 식별자. 디지털 자산인 경우 필수(required) 필드입니다."
          schema:
            type: string
      responses:
        "200":
          description: 출금 가능 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalChance"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Travel Rule ──

  /v1/travel_rule/vasps:
    get:
      operationId: listTravelRuleVasps
      summary: 계정주 확인 서비스 지원 거래소 목록 조회
      description: 계정주 확인 서비스를 지원하는 거래소 목록을 조회합니다.
      tags: [travel_rule]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      responses:
        "200":
          description: 트래블룰 지원 거래소 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TravelRuleVasp"

  /v1/travel_rule/deposit/uuid:
    post:
      operationId: verifyTravelRuleByUuid
      summary: 입금 UUID로 계정주 검증 요청
      description: |
        입금의 UUID로 트래블룰 검증(입금 계정주 확인)을 요청합니다.

        계정주 검증이 완료된 이후 입금 반영이 진행됩니다.
        검증이 완료 시 즉시 입금 반영이 진행되나, 블록체인 네트워크 지연 등으로
        검증 이후에도 입금 자체가 아직 처리 중인 경우 입금이 완료된 이후 입금 반영이 진행됩니다.
      tags: [travel_rule]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deposit_uuid, vasp_uuid]
              properties:
                deposit_uuid:
                  type: string
                  description: 입금의 유일식별자(UUID)
                vasp_uuid:
                  type: string
                  description: 자산을 출금한 상대 거래소의 유일식별자(UUID)
      responses:
        "201":
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelRuleVerification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/travel_rule/deposit/txid:
    post:
      operationId: verifyTravelRuleByTxid
      summary: 입금 TxID로 계정주 검증 요청
      description: |
        입금의 TxID로 트래블룰 검증(입금 계정주 확인)을 요청합니다.

        계정주 검증이 완료된 이후 입금 반영이 진행됩니다.
        검증이 완료 시 즉시 입금 반영이 진행되나, 블록체인 네트워크 지연 등으로
        검증 이후에도 입금 자체가 아직 처리 중인 경우 입금이 완료된 이후 입금 반영이 진행됩니다.
      tags: [travel_rule]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vasp_uuid, txid, currency, net_type]
              properties:
                vasp_uuid:
                  type: string
                  description: 자산을 출금한 상대 거래소의 유일식별자(UUID)
                txid:
                  type: string
                  description: 검증할 입금의 트랜잭션 ID
                currency:
                  type: string
                  description: 조회하고자 하는 통화 코드
                net_type:
                  type: string
                  description: 디지털 자산 입출금에 사용되는 블록체인 네트워크 식별자
      responses:
        "201":
          description: 검증 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelRuleVerification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Service ──

  /v1/status/wallet:
    get:
      operationId: listWalletStatus
      summary: 입출금 서비스 상태 조회
      description: |
        전체 통화에 대해 입출금 서비스 상태를 조회합니다.

        입출금 서비스 상태 조회 API는 실시간 상태 조회를 보장하지 않으며,
        반영은 수 분 정도 지연될 수 있습니다.
      tags: [service]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      responses:
        "200":
          description: 입출금 서비스 상태 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletStatus"

  /v1/api_keys:
    get:
      operationId: listApiKeys
      summary: API Key 목록 조회
      description: 계정의 모든 API Key 목록과 각 Key의 만료일자를 조회합니다.
      tags: [service]
      x-rate-limit:
        group: default
        max_per_sec: 30
        unit: account
      responses:
        "200":
          description: API Key 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"

# ─────────────────────────── components ───────────────────────────

components:

  # ── Security Schemes ──

  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Parameters ──

  parameters:
    OrderByParam:
      name: order_by
      in: query
      required: false
      description: "결과 정렬 방식. `asc`(오름차순), `desc`(내림차순, 기본값)"
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  # ── Responses ──

  responses:
    BadRequest:
      description: 잘못된 요청 파라미터
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidParameter:
              summary: 파라미터 오류
              value:
                error:
                  name: "invalid_parameter"
                  message: "잘못된 파라미터"
            validationError:
              summary: 검증 오류
              value:
                error:
                  name: "validation_error"
                  message: "\"field name\" does not have a valid value"

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            noAuthorizationIp:
              summary: 인증되지 않은 IP
              value:
                error:
                  name: "no_authorization_ip"
                  message: "This is not a verified IP."
            jwtVerification:
              summary: JWT 검증 실패
              value:
                error:
                  name: "jwt_verification"
                  message: "잘못된 API 키입니다."
            invalidQueryPayload:
              summary: 쿼리 페이로드 검증 실패
              value:
                error:
                  name: "invalid_query_payload"
                  message: "Jwt의 query를 검증하는데 실패하였습니다."

    Forbidden:
      description: 접근 권한 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              name: "market_offline"
              message: "시스템 점검 중입니다. 점검이 완료된 후에 다시 시도해주세요."

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            orderNotFound:
              summary: 주문 미발견
              value:
                error:
                  name: "order_not_found"
                  message: "주문을 찾지 못했습니다."
            depositNotFound:
              summary: 입금 미발견
              value:
                error:
                  name: "deposit_not_found"
                  message: "입출금 정보를 찾지 못했습니다."
            withdrawNotFound:
              summary: 출금 미발견
              value:
                error:
                  name: "withdraw_not_found"
                  message: "출금 정보를 찾지 못했습니다."

  # ── Schemas ──

  schemas:

    # ── Error ──

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [name, message]
          properties:
            name:
              type: string
              description: "에러 코드 또는 에러명. [예시] invalid_parameter, validation_error, order_not_found"
            message:
              type: string
              description: 에러 메세지

    # ── Accounts ──

    Account:
      type: object
      required:
        - currency
        - balance
        - locked
        - avg_buy_price
        - avg_buy_price_modified
        - unit_currency
      properties:
        currency:
          type: string
          description: 통화 코드
          example: "KRW"
        balance:
          type: string
          description: "주문 가능 수량 또는 금액. 디지털 자산의 경우 수량, 법정 통화(KRW)의 경우 금액"
          example: "1000000.0"
        locked:
          type: string
          description: 출금이나 주문 등에 잠겨 있는 잔액
          example: "0.0"
        avg_buy_price:
          type: string
          description: 매수 평균가
          example: "0"
        avg_buy_price_modified:
          type: boolean
          description: 매수 평균가 수정 여부
          example: false
        unit_currency:
          type: string
          description: "평균가 기준 통화. [예시] KRW, BTC, USDT"
          example: "KRW"

    # ── Orders ──

    CreateOrderRequest:
      type: object
      required: [market, side]
      properties:
        market:
          type: string
          description: 주문을 생성하고자 하는 대상 페어(거래쌍)
          example: "KRW-BTC"
        side:
          type: string
          enum: [bid, ask]
          description: "주문 방향(매수/매도). 매수: `bid`, 매도: `ask`"
        volume:
          type: string
          description: "주문 수량. 지정가 매수/매도(`limit`), 시장가 매도(`market`), 최유리 지정가 매도(`best` + `ask`)에서 필수"
        price:
          type: string
          description: "주문 단가 또는 총액. 지정가 매수/매도(`limit`), 시장가 매수(`price`), 최유리 지정가 매수(`best` + `bid`)에서 필수"
        ord_type:
          type: string
          enum: [limit, price, market, best]
          default: limit
          description: "주문 유형. `limit`: 지정가, `price`: 시장가 매수, `market`: 시장가 매도, `best`: 최유리 지정가"
        identifier:
          type: string
          description: 클라이언트 지정 주문 식별자. 계정 전체 주문 내 유일한 값 필요, 재사용 불가
        time_in_force:
          type: string
          enum: [ioc, fok, post_only]
          description: "주문 체결 조건. `ioc`: IOC, `fok`: FOK, `post_only`: Post Only. 최유리 지정가(`best`)에서는 `ioc` 또는 `fok` 필수"
        smp_type:
          type: string
          enum: [cancel_maker, cancel_taker, reduce]
          description: "자전거래 체결 방지(SMP) 모드. `cancel_maker`, `cancel_taker`, `reduce`"

    OrderCreated:
      type: object
      required:
        - market
        - uuid
        - side
        - ord_type
        - state
        - created_at
        - remaining_volume
        - executed_volume
        - reserved_fee
        - remaining_fee
        - paid_fee
        - locked
        - trades_count
        - prevented_volume
        - prevented_locked
      properties:
        market:
          type: string
          description: "페어(거래쌍)의 코드"
          example: "KRW-BTC"
        uuid:
          type: string
          description: 주문의 유일 식별자
        side:
          type: string
          enum: [ask, bid]
          description: "주문 방향(매수/매도)"
        ord_type:
          type: string
          enum: [limit, price, market, best]
          description: 주문 유형
        price:
          type: string
          description: 주문 단가 또는 총액
        state:
          type: string
          enum: [wait, watch, done, cancel]
          description: "주문 상태. `wait`: 체결 대기, `watch`: 예약 주문 대기, `done`: 체결 완료, `cancel`: 주문 취소"
        created_at:
          type: string
          description: "주문 생성 시각 (KST 기준). [형식] yyyy-MM-ddTHH:mm:ss+09:00"
        volume:
          type: string
          description: 주문 요청 수량
        remaining_volume:
          type: string
          description: 체결 후 남은 주문 양
        executed_volume:
          type: string
          description: 체결된 양
        reserved_fee:
          type: string
          description: 수수료로 예약된 비용
        remaining_fee:
          type: string
          description: 남은 수수료
        paid_fee:
          type: string
          description: 사용된 수수료
        locked:
          type: string
          description: 거래에 사용 중인 비용
        trades_count:
          type: integer
          description: 해당 주문에 대한 체결 건수
        time_in_force:
          type: string
          enum: [ioc, fok, post_only]
          description: 주문 체결 옵션
        identifier:
          type: string
          description: "클라이언트 지정 주문 식별자. 2024년 10월 18일 이후 생성된 주문에 대해서만 제공"
