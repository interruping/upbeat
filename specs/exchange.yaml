        created_at:
          type: string
          description: "입금 요청 시각 (KST). [형식] yyyy-MM-ddTHH:mm:ss+09:00"
        done_at:
          type: ["string", "null"]
          description: "입금 완료 시각 (KST). [형식] yyyy-MM-ddTHH:mm:ss+09:00"
        amount:
          type: string
          description: 입금 금액 또는 수량
          example: "100000.0"
        fee:
          type: string
          description: 입금 수수료
          example: "0.0"
        transaction_type:
          type: string
          enum: [default, internal]
          description: "입금 유형. `default`: 일반 입금, `internal`: 바로 입금 (업비트 계정간 입금)"
          default: default

    DepositAddress:
      type: object
      required:
        - currency
        - net_type
      properties:
        currency:
          type: string
          description: 통화 코드
          example: "BTC"
        net_type:
          type: ["string", "null"]
          description: "입금 네트워크 유형. [예시] ETH, TRX, SOL"
          example: "BTC"
        deposit_address:
          type: string
          description: "입금 주소. 생성이 완료되지 않은 경우 null로 반환될 수 있습니다."
          example: "3EusRwybuZUhVDeHL7gh3HSLmbhLcy7NqD"
        secondary_address:
          type: ["string", "null"]
          description: "2차 출금 주소. 일부 디지털 자산의 경우 Destination Tag, Memo, 또는 Message와 같은 2차 주소를 포함합니다."

    DepositChanceCoin:
      type: object
      required:
        - currency
        - net_type
        - is_deposit_possible
        - deposit_impossible_reason
        - minimum_deposit_amount
        - minimum_deposit_confirmations
        - decimal_precision
      properties:
        currency:
          type: string
          description: 통화 코드
          example: "BTC"
        net_type:
          type: ["string", "null"]
          description: "입금 네트워크 유형. [예시] ETH, TRX, SOL"
          example: "BTC"
        is_deposit_possible:
          type: boolean
          description: 입금 가능 여부
        deposit_impossible_reason:
          type: string
          description: "입금 불가 이유. is_deposit_possible이 false일 경우 메시지가 제공됩니다."
        minimum_deposit_amount:
          type: string
          description: 최소 입금 수량
          example: "0"
        minimum_deposit_confirmations:
          type: integer
          description: 최소 입금 컨펌 수
        decimal_precision:
          type: integer
          description: 입금 시 적용되는 소수점 자릿수

    # ── Withdrawals ──

    Withdrawal:
      type: object
      required:
        - type
        - uuid
        - currency
        - txid
        - state
        - created_at
        - amount
        - fee
        - transaction_type
        - is_cancelable
      properties:
        type:
          type: string
          description: 입출금 종류
          default: withdraw
          example: "withdraw"
        uuid:
          type: string
          description: 출금의 유일 식별자
        currency:
          type: string
          description: 통화 코드
          example: "BTC"
        net_type:
          type: string
          description: "출금 네트워크 유형. 원화(KRW) 출금의 경우 null로 반환됩니다. [예시] ETH, TRX, SOL"
        txid:
          type: ["string", "null"]
          description: 트랜잭션 ID
        state:
          type: string
          enum: [WAITING, PROCESSING, DONE, FAILED, CANCELLED, REJECTED]
          description: "출금 처리 상태. `WAITING`: 대기 중, `PROCESSING`: 처리 중, `DONE`: 완료, `FAILED`: 실패, `CANCELLED`: 취소됨, `REJECTED`: 거절됨"
        created_at:
          type: string
          description: 출금 생성 시간
        done_at:
          type: ["string", "null"]
          description: "출금 완료 시간. 출금이 완료되지 않은 경우 null"
        amount:
          type: string
          description: 출금하고자 하는 자산의 수량
          example: "0.01"
        fee:
          type: string
          description: 출금 수수료
          example: "0.0"
        transaction_type:
          type: string
          enum: [default, internal]
          description: "출금 유형. `default`: 일반출금, `internal`: 바로출금"
          default: default
        is_cancelable:
          type: boolean
          description: 출금 취소 가능 여부

    WithdrawalKrw:
      type: object
      required:
        - type
        - uuid
        - currency
        - txid
        - state
        - created_at
        - amount
        - fee
        - transaction_type
        - is_cancelable
      properties:
        type:
          type: string
          description: 입출금 종류
          default: withdraw
        uuid:
          type: string
          description: 출금의 유일 식별자
        currency:
          type: string
          description: 출금하고자 하는 통화 코드
          example: "KRW"
        txid:
          type: ["string", "null"]
          description: 트랜잭션 ID
        state:
          type: string
          enum: [WAITING, PROCESSING, DONE, FAILED, CANCELLED, REJECTED]
          description: 출금 처리 상태
        created_at:
          type: string
          description: 출금 생성 시간
        done_at:
          type: ["string", "null"]
          description: "출금 완료 시간. 출금이 완료되지 않은 경우 null"
        amount:
          type: string
          description: 출금 원화 금액
        fee:
          type: string
          description: 출금 수수료
        transaction_type:
          type: string
          enum: [default, internal]
          description: "출금 유형. `default`: 일반출금, `internal`: 바로출금"
          default: default
        is_cancelable:
          type: boolean
          description: 출금 취소 가능 여부

    WithdrawCoinRequest:
      type: object
      required: [currency, net_type, amount, address]
      properties:
        currency:
          type: string
          description: 출금하고자 하는 디지털 자산의 통화 코드
          example: "BTC"
        net_type:
          type: string
          description: 블록체인 네트워크 식별자. 출금 허용 주소 목록 조회 API를 통해 확인할 수 있습니다.
          example: "BTC"
        amount:
          type: string
          description: 출금하고자 하는 자산의 수량. 숫자 형식의 String
          example: "0.01"
        address:
          type: string
          description: 디지털 자산 출금 시 수신 주소. 출금 가능 주소 목록에 등록된 주소만 사용 가능
        secondary_address:
          type: ["string", "null"]
          description: "2차 출금 주소. 일부 디지털 자산의 경우 Destination Tag, Memo 등"
        transaction_type:
          type: string
          enum: [default, internal]
          default: default
          description: "출금 유형. `default`: 일반출금, `internal`: 바로출금"

    WithdrawalAddress:
      type: object
      required:
        - currency
        - net_type
        - network_name
        - withdraw_address
      properties:
        currency:
          type: string
          description: 출금하고자 하는 디지털 자산의 통화 코드
          example: "BTC"
        net_type:
          type: string
          description: "출금 네트워크 유형. 출금 요청 시 사용되는 net_type 파라미터와 같은 값. [예시] ETH, TRX, SOL"
          example: "BTC"
        network_name:
          type: string
          description: "출금 네트워크 이름. [예시] Ethereum, Bitcoin, Tron, Solana"
          example: "Bitcoin"
        withdraw_address:
          type: string
          description: 디지털 자산 출금 시 수신 주소
          example: "1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa"
        secondary_address:
          type: ["string", "null"]
          description: "2차 출금 주소. 일부 디지털 자산의 경우 Destination Tag, Memo 등"
        beneficiary_name:
          type: string
          description: 수취 지갑 소유주명
        beneficiary_company_name:
          type: ["string", "null"]
          description: 출금된 자산을 받을 법인명
        beneficiary_type:
          type: ["string", "null"]
          enum: [individual, corporate, null]
          description: "계정주 타입. `individual`: 개인 지갑, `corporate`: 법인 지갑"
        exchange_name:
          type: ["string", "null"]
          description: "출금 허용 주소가 등록된 거래소명. [예시] 바이낸스, 바이비트"
        wallet_type:
          type: ["string", "null"]
          description: "개인 지갑 종류. [예시] 메타마스크"

    WithdrawalChance:
      type: object
      required:
        - member_level
        - currency
        - account
        - withdraw_limit
      properties:
        member_level:
          type: object
          description: 사용자 보안 등급 정보
          required:
            - security_level
            - fee_level
            - email_verified
            - identity_auth_verified
            - bank_account_verified
            - two_factor_auth_verified
            - locked
            - wallet_locked
          properties:
            security_level:
              type: integer
              description: 보안 등급
            fee_level:
              type: integer
              description: 수수료 등급
            email_verified:
              type: boolean
              description: 이메일 인증 여부
            identity_auth_verified:
              type: boolean
              description: 실명 인증 여부
            bank_account_verified:
              type: boolean
              description: 계좌 인증 여부
            two_factor_auth_verified:
              type: boolean
              description: 2FA 활성화 여부
            locked:
              type: boolean
              description: 계정 보호 상태
            wallet_locked:
              type: boolean
              description: 출금 보호 상태
        currency:
          type: object
          description: 통화 정보
          required:
            - code
            - withdraw_fee
            - is_coin
            - wallet_state
            - wallet_support
          properties:
            code:
              type: string
              description: 통화 코드
              example: "BTC"
            withdraw_fee:
              type: string
              description: 출금 수수료
              example: "0.0008"
            is_coin:
              type: boolean
              description: 디지털 자산 여부
            wallet_state:
              type: string
              enum: [working, unsupported]
              description: "자산별 입출금 지원 이력 여부. `working`: 입출금 지원한 적 있음, `unsupported`: 입출금 미지원"
            wallet_support:
              type: array
              description: "해당 통화의 입출금 가능 여부"
              items:
                type: string
                enum: [deposit, withdraw]
        account:
          type: object
          description: 자산 잔고 정보
          required:
            - currency
            - balance
            - locked
            - avg_buy_price
            - avg_buy_price_modified
            - unit_currency
          properties:
            currency:
              type: string
              description: 통화 코드
            balance:
              type: string
              description: "주문 가능 수량 또는 금액"
            locked:
              type: string
              description: 출금이나 주문 등에 잠겨 있는 잔액
            avg_buy_price:
              type: string
              description: 매수 평균가
            avg_buy_price_modified:
              type: boolean
              description: 매수 평균가 수정 여부
            unit_currency:
              type: string
              description: "평균가 기준 통화. [예시] KRW, BTC, USDT"
        withdraw_limit:
          type: object
          description: 출금 제약 조건
          required:
            - currency
            - onetime
            - daily
            - remaining_daily
            - remaining_daily_fiat
            - fiat_currency
          properties:
            currency:
              type: string
              description: 통화 코드
            onetime:
              type: string
              description: "1회 출금 한도 (deprecated)"
            daily:
              type: ["string", "null"]
              description: "1일 출금 한도 (deprecated)"
            remaining_daily:
              type: string
              description: "1일 잔여 출금 한도 (deprecated)"
            remaining_daily_fiat:
              type: string
              description: 통합 1일 잔여 출금 한도
            fiat_currency:
              type: string
              description: 기준 법정 통화
            minimum:
              type: string
              description: 최소 출금 금액 또는 수량
            fixed:
              type: integer
              description: 출금 금액/수량 소수점 자리 수
            withdraw_delayed_fiat:
              type: string
              description: 출금 지연 제도로 인해 출금이 제한된 금액
            can_withdraw:
              type: boolean
              description: 출금 지원 여부
            remaining_daily_krw:
              type: string
              description: "통합 1일 잔여 출금 한도 (KRW 기준) (deprecated)"

    # ── Travel Rule ──

    TravelRuleVasp:
      type: object
      required:
        - vasp_name
        - vasp_uuid
        - depositable
        - withdrawable
      properties:
        vasp_name:
          type: string
          description: "거래소 이름. VASP(가상자산사업자)의 이름"
          example: "업비트"
        vasp_uuid:
          type: string
          description: 거래소의 유일식별자(UUID)
        depositable:
          type: boolean
          description: 해당 VASP로부터 업비트로의 입금 반영 가능 여부
        withdrawable:
          type: boolean
          description: 해당 VASP로의 출금 가능 여부

    TravelRuleVerification:
      type: object
      required:
        - deposit_uuid
        - verification_result
        - deposit_state
      properties:
        deposit_uuid:
          type: string
          description: 입금의 유일식별자(UUID)
        verification_result:
          type: string
          description: 검증 결과
          example: "verified"
        deposit_state:
          type: string
          enum: [PROCESSING, ACCEPTED, CANCELLED, REJECTED, TRAVEL_RULE_SUSPECTED, REFUNDING, REFUNDED]
          description: |
            입금 처리 상태.
            - `PROCESSING`: 입금 진행 중
            - `ACCEPTED`: 완료
            - `CANCELLED`: 취소됨
            - `REJECTED`: 거절됨
            - `TRAVEL_RULE_SUSPECTED`: 트래블룰 추가 인증 대기중
            - `REFUNDING`: 반환 절차 중
            - `REFUNDED`: 반환됨

    # ── Service ──

    WalletStatus:
      type: object
      required:
        - currency
        - wallet_state
        - block_elapsed_minutes
        - net_type
        - network_name
      properties:
        currency:
          type: string
          description: 통화 코드
          example: "BTC"
        wallet_state:
          type: string
          enum: [working, withdraw_only, deposit_only, paused, unsupported]
          description: "입출금 상태. `working`: 입출금 가능, `withdraw_only`: 출금만 가능, `deposit_only`: 입금만 가능, `paused`: 입출금 중단, `unsupported`: 입출금 미지원"
        block_state:
          type: string
          enum: [normal, delayed, inactive]
          description: "블록체인 네트워크의 상태. 지갑 또는 거래소 상태에 따라 null로 반환될 수 있습니다. `normal`: 정상, `delayed`: 지연, `inactive`: 비활성"
        block_height:
          type: integer
          description: "현재 확인된 블록의 높이. null로 반환될 수 있습니다."
        block_updated_at:
          type: string
          description: "마지막으로 블록 높이가 갱신된 시각 (UTC). null로 반환될 수 있습니다. [형식] yyyy-MM-ddTHH:mm:sss+00:00"
        block_elapsed_minutes:
          type: integer
          description: "마지막 블록 업데이트 이후 현재까지 경과한 시간(분). null로 반환될 수 있습니다."
        net_type:
          type: string
          description: "입출금 네트워크 유형. [예시] ETH, TRX, SOL"
          example: "BTC"
        network_name:
          type: string
          description: "입출금 네트워크 이름. [예시] Ethereum, Bitcoin, Tron, Solana"
          example: "Bitcoin"

    ApiKey:
      type: object
      required:
        - access_key
        - expire_at
      properties:
        access_key:
          type: string
          description: API Key의 Access Key
          example: "abcd134567890231bacbd"
        expire_at:
          type: string
          description: "해당 Access Key의 Deprecated일시 (KST). [형식] yyyy-MM-ddTHH:mm:ss+09:00"
          example: "2026-07-01T09:00:00+09:00"
