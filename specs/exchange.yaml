        group: default
        max_per_sec: 30
        unit: account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currency, net_type]
              properties:
                currency:
                  type: string
                  description: 입금 주소가 생성된 통화 코드
                net_type:
                  type: string
                  description: 네트워크 유형
